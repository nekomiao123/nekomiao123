name: Profile metrics

on:
  schedule:
    # Runs daily at 09:00 Asia/Shanghai (01:00 UTC).
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  generate:
    if: github.repository == 'nekomiao123/nekomiao123'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate overview metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          plugin_isocalendar: yes
          config_timezone: Asia/Shanghai

      - name: Generate additional metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: metrics.additional.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: no
          plugin_habits_charts: yes
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          plugin_languages_skipped: viewv
          plugin_stargazers: yes
          plugin_stars: yes
          plugin_stars_limit: 3
          config_timezone: Asia/Shanghai
          config_order: languages, habits, stargazers, stars
